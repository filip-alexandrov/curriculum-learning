defaults:
  - _aucurriculum_train_
  - _self_

results_dir: /nas/student/FilipAlexandrov/results
experiment_id: default
training_type: step
eval_frequency: 391
iterations: 78200
save_frequency: 999999

hydra:
  sweeper:
    params:
      +seed: 11
      +batch_size: 128
      +learning_rate: 0.1
      dataset: CIFAR-100
      augmentation: CIFAR100-aug
      model: WideResNet-28-4
      optimizer: SAM
      scheduler: CosineAnnealingLR
      curriculum: Curriculum
      curriculum/sampling: Balanced
      curriculum/scoring: PredictionDepth
      curriculum/pacing: Linear
      curriculum.pacing.initial_size: 0.1
      curriculum.pacing.final_iteration: 0.9
      device: cuda
