id: PredictionDepth
type: PredictionDepth
_target_: aucurriculum.curricula.scoring.PredictionDepth
run_name: CIFAR-100_WideResNet-28-4_SAM_0.1_128_epoch_200_CosineAnnealingLR_CIFAR100-aug_N_N_None_None_1_0_11
# Probe placements for WideResNet-28-4 (verified via torch.fx.symbolic_trace on
# cluster_project/wide_resnet.py: WideResNet(output_dim=100, depth=28, widen_factor=4)).
# Architecture is conv0 -> group1/group2/group3 (4 pre-activation blocks each,
# stride-2 at the first block of group2/group3) -> bn_final -> pool -> fc.
probe_placements:
  - conv0                     # stem conv
  - group\d_blocks_0_shortcut # downsampling/channel-projection shortcuts (one per group)
  - add(_\d+)?                # residual additions, one per block (12 total)
  - bn_final                  # final BN before global average pooling
max_embedding_size: 8192
match_dimensions: true
stop: last # "best" or "last"
subset: train # train, dev, test