defaults:
  - _aucurriculum_train_
  - _self_

results_dir: /nas/student/FilipAlexandrov/results
experiment_id: SAM_DifficultyImageNet
training_type: step
eval_frequency: 313
iterations: 62500
save_frequency: 999999

hydra:
  sweeper:
    params:
      +seed: 11
      +batch_size: 128
      +learning_rate: 0.1
      dataset: Difficulty-ImageNet
      augmentation: ImageNet-aug
      model: ResNet-50
      optimizer: SAM
      scheduler: CosineAnnealingLR
      curriculum: SharpnessScore
      curriculum/sampling: Balanced
      curriculum/scoring: ClassificationTime,SharpnessScore_DifficultyImageNet,Random
      curriculum/pacing: Linear
      curriculum.pacing.initial_size: 0.1
      curriculum.pacing.final_iteration: 0.9
      device: cuda
