defaults:
  - _aucurriculum_train_
  - _self_

results_dir: /nas/student/FilipAlexandrov/results
experiment_id: SAM_DifficultyImageNet_Pretrained
iterations: 200
save_frequency: 10

hydra:
  sweeper:
    params:
      +seed: 11
      +batch_size: 128
      +learning_rate: 0.01
      dataset: Difficulty-ImageNet
      augmentation: ImageNet-aug
      model: ResNet-50-T
      optimizer: SAM
      scheduler: OneCycleLR-Warmup
      scheduler.max_lr: 0.01
      scheduler.pct_start: 0.02
      scheduler.div_factor: 5.0
      curriculum: None
      curriculum/sampling: None
      curriculum/scoring: None
      curriculum/pacing: None
      curriculum.pacing.initial_size: 1
      curriculum.pacing.final_iteration: 0
      device: cuda
